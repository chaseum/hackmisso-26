<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lock Animation</title>

  <style>
    body {
      background: #020617;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .lock {
      position: relative;
      width: 150px;
      height: 180px;
      cursor: pointer;
    }

    /* Lock body /
    .body {
      width: 100%;
      height: 100px;
      background: #0f172a;
      border: 4px solid #22d3ee;
      border-radius: 12px;
      position: absolute;
      bottom: 0;
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    / Shackle (NOW STRAIGHT) /
    .shackle {
      position: absolute;
      width: 80px;
      height: 80px;
      border: 6px solid #e5e7eb;
      border-bottom: none;
      border-radius: 50px 50px 0 0;
      top: 0;
      left: 50%;
      transform: translateX(-50%) translateY(-10px); / slightly raised (open) /
      transition: transform 0.3s ease;
    }

    / 🔹 Hover preview (small drop) /
    .lock:hover .shackle {
      transform: translateX(-50%) translateY(0px);
    }

    / 🔒 Click → fully drops into place /
    .lock.locked .shackle {
      animation: drop 0.35s ease forwards;
    }

    @keyframes drop {
      0%   { transform: translateX(-50%) translateY(0px); }
      60%  { transform: translateX(-50%) translateY(15px); } / overshoot /
      100% { transform: translateX(-50%) translateY(10px); } / final lock position /
    }

    / 🔴 Keyhole */
    .keyhole {
      position: relative;
      width: 30px;
      height: 30px;
      border: 3px solid #ff006e;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      box-shadow: 0 0 10px rgba(255, 0, 110, 0.6);
    }
.keyhole::after {
      content: "";
      width: 6px;
      height: 18px;
      background: #ff006e;
      border-radius: 3px;
      margin-bottom: -10px;
    }

    /* 🔥 Keyhole pulse on lock */
    .lock.locked .keyhole {
      animation: keyPulse 0.4s ease;
    }

    @keyframes keyPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.85); }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

  </style>
</head>

<body>

  <div class="lock" id="lock">
    <div class="shackle"></div>

    <div class="body">
      <div class="keyhole"></div>
    </div>
  </div>

  <script>
    const lock = document.getElementById("lock");

    lock.addEventListener("click", () => {
      lock.classList.toggle("locked");
    });
  </script>

</body>
</html>
